<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/media.css">

  <style>
    .contact-form {
      max-width: 500px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .contact-form button {
      padding: 12px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    .contact-form button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="container container-lg">
    <div class="header-nav">
      <a href="index.html" class="logo">J.Kim</a>

      <nav>
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="overview.html" class="nav-link active">Overview</a></li>
          <li><a href="blender.html" class="nav-link">Blender</a></li>
          <li><a href="vex.html" class="nav-link">VEX</a></li>
          <li><a href="virtual.html" class="nav-link">Project</a></li>
          <li><a href="awards.html" class="nav-link">Awards</a></li>
          <li><a href="contact.html" class="nav-link active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<section class="contact">
  <div class="container">
    <h2 class="title">Contact</h2>
    <p>Send me a message directly:</p>

    <!-- IMPORTANT: replace action with your Formspree URL -->
    <form action="https://formspree.io/f/xaqlooor" method="POST" class="contact-form">
      
      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>

  </div>
</section>

</body>
</html>
